<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Edit Diary</title>
<link rel="stylesheet" href="/css/main.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white">
<div class="container">
  <a class="navbar-brand fw-bold" th:href="@{/dashboard}">DiaryNate</a>
</div>
</nav>

<div class="container mt-5">
<div class="card shadow p-4">

  <h3>Edit Diary</h3>

  <form method="post" th:action="@{/update/{id}(id=${diary.id})}">

    <div class="mb-3">
      <label class="form-label">Title</label>
      <input type="text" class="form-control" name="title" th:value="${diary.title}" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Diary Content</label>
      <textarea class="form-control" rows="6" name="content" required th:text="${diary.content}"></textarea>
    </div>

    <button class="btn btn-primary">Update Diary</button>
    <a href="/dashboard" class="btn btn-secondary">Cancel</a>

  </form>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
