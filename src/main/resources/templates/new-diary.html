<!DOCTYPE html>
<html>

<head>

<title>New Diary</title>

<link rel="stylesheet" href="/css/dashboard.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="form-container">

<h3>Create New Diary</h3>

<form method="post" action="/save">

<div class="mb-3">

<label class="form-label">Title</label>
<input type="text" class="form-control" name="title" required>

</div>

<div class="mb-3">

<label class="form-label">Diary Content</label>
<textarea class="form-control" rows="6" name="content" required></textarea>

</div>

<button type="submit" class="btn btn-primary">Save Diary</button>

<a href="/dashboard" class="btn btn-secondary">Cancel</a>

</form>

</div>

</body>
</html>
