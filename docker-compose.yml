version: '3.8'
services:
  root:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
    - 8080:8080
    networks:
    - app-network
    restart: unless-stopped
    depends_on:
    - mongodb
  mongodb:
    image: mongo:latest
    networks:
    - app-network
    volumes:
    - mongodb-data:/data/db
networks:
  app-network:
    driver: bridge
volumes:
  mongodb-data: null
